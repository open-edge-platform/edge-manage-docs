name: Deploy

on:
  workflow_call:
    inputs:
      mode:
        description: '"hub" | "spoke"'
        required: true
        type: string
      s3_path:
        description: 'S3 prefix to sync to (empty = bucket root)'
        required: false
        type: string
        default: ''
      spoke_id:
        description: 'Spoke identifier — spoke mode only'
        required: false
        type: string
        default: ''
      spoke_overrides:
        description: 'SPOKE_OVERRIDES value (<repo>:<sha>) — spoke mode only'
        required: false
        type: string
        default: ''
      ref:
        description: 'Git ref to checkout (empty = HEAD)'
        required: false
        type: string
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: publish-preview
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false
      - uses: ./.github/actions/setup-build
      - name: Build
        env:
          HUB_ONLY:        ${{ inputs.mode == 'hub' && '1' || '' }}
          SPOKE:           ${{ inputs.mode == 'spoke' && inputs.spoke_id || '' }}
          SPOKE_OVERRIDES: ${{ inputs.spoke_overrides }}
          SITE_URL:        ${{ secrets.DEV_URL }}
          BASE_URL:        ${{ inputs.s3_path != '' && format('/{0}/', inputs.s3_path) || '/' }}
        run: npm run build
      - name: Compute excludes
        id: excludes
        if: inputs.mode == 'hub'
        run: |
          set -euo pipefail
          {
            echo "patterns<<EOF"
            echo "pr/*"
            yq -r '.spokes[].routeBasePath | . + "/*"' spokes.yml
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Sync
        uses: ./.github/actions/aws-deploy
        with:
          role:     ${{ secrets.DEV_ROLE }}
          bucket:   ${{ secrets.DEV_BUCKET }}
          path:     ${{ inputs.s3_path }}
          excludes: ${{ steps.excludes.outputs.patterns }}

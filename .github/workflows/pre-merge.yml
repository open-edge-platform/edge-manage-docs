name: Pre-Merge CI Pipeline

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches: ['main', 'release-*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-checks:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.branch_check.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Validate branch name
        id: branch_check
        run: |
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          echo "Branch: $BRANCH"

          if [[ "$BRANCH" == release-* ]]; then
            if [[ "$BRANCH" =~ ^release-[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
              echo "✅ Valid release branch"
              echo "skip=false" >> $GITHUB_OUTPUT
            else
              echo "⚠️ Invalid release branch → skipping pipeline"
              echo "skip=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "Not a release branch"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: "Verify Branch Name"
        if: steps.branch_check.outputs.skip != 'true'
        uses: open-edge-platform/orch-ci/verify-branch-name@a95228137803b756aae327668c115db235802982  # yamllint disable-line rule:line-length

  pre-merge-pipeline:
    permissions:
      contents: read
    needs: pre-checks
    if: needs.pre-checks.outputs.skip != 'true'
    uses: open-edge-platform/orch-ci/.github/workflows/pre-merge.yml@a95228137803b756aae327668c115db235802982  # yamllint disable-line rule:line-length
    with:
      run_security_scans: false
      run_version_check: true
      run_dep_version_check: false
      run_build: true
      run_lint: true
      run_test: false
      run_validate_clean_folder: false
      run_docker_build: false
      run_artifact: false
    secrets:
      NO_AUTH_ECR_PUSH_USERNAME: ${{ secrets.NO_AUTH_ECR_PUSH_USERNAME }}
      NO_AUTH_ECR_PUSH_PASSWD: ${{ secrets.NO_AUTH_ECR_PUSH_PASSWD }}
